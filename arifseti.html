<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arifseti - Link Belanja</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }
  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }
  .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #ec4899);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
    letter-spacing: -1px;
  }
  .profile h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .profile p { font-size: 13px; color: #888; }
  .section { width: 100%; max-width: 420px; margin-bottom: 28px; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .platform-block {
    background: #1a1a1a;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid #2a2a2a;
  }
  .platform-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid #222;
  }
  .platform-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .shopee-icon { background: #ff5722; }
  .tokopedia-icon { background: #03a84e; }
  .platform-name { font-size: 15px; font-weight: 600; }
  .platform-sub { font-size: 12px; color: #666; margin-top: 1px; }
  .categories {
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .cat-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #222;
    border-radius: 10px;
    text-decoration: none;
    color: #ddd;
    font-size: 14px;
    transition: background 0.15s;
    border: 1px solid #2e2e2e;
  }
  .cat-link:hover { background: #2c2c2c; color: #fff; }
  .cat-link .cat-label { display: flex; align-items: center; gap: 8px; }
  .cat-link .cat-emoji { font-size: 16px; }
  .cat-link .arrow { color: #444; font-size: 12px; }
  .cat-link.main-link {
    background: #1e1e1e;
    border: 1px solid #333;
    color: #ccc;
    font-weight: 500;
  }
  .empty-cat {
    font-size: 13px;
    color: #444;
    padding: 8px 12px;
    font-style: italic;
  }
  .footer {
    font-size: 11px;
    color: #333;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="profile">
  <div class="avatar">AS</div>
  <h1>arifseti</h1>
  <p>Link belanja rekomendasiku 🛍️</p>
</div>

<div id="content" style="width:100%;max-width:420px;"></div>

<div class="footer">arifseti · link belanja</div>

<script>
const STORAGE_KEY = 'arifseti_links_v1';

const DEFAULT_DATA = {
  shopee: {
    name: "Shopee",
    icon: "🛒",
    color: "shopee-icon",
    main: "",
    categories: []
  },
  tokopedia: {
    name: "Tokopedia",
    icon: "🟢",
    color: "tokopedia-icon",
    main: "",
    categories: []
  }
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : DEFAULT_DATA;
  } catch(e) {
    return DEFAULT_DATA;
  }
}

function renderCatArrow() { return '<span class="arrow">›</span>'; }

function render() {
  const data = loadData();
  const el = document.getElementById('content');
  let html = '';

  const platforms = [
    { key: 'shopee', label: 'Shopee', iconClass: 'shopee-icon', emoji: '🛒' },
    { key: 'tokopedia', label: 'Tokopedia', iconClass: 'tokopedia-icon', emoji: '🟢' }
  ];

  platforms.forEach(p => {
    const pd = data[p.key] || { name: p.label, main: '', categories: [] };
    const cats = pd.categories || [];

    html += `<div class="section">`;
    html += `<div class="section-title">Beli di ${p.label}</div>`;
    html += `<div class="platform-block">`;
    html += `<div class="platform-header">`;
    html += `<div class="platform-icon ${p.iconClass}">${p.emoji}</div>`;
    html += `<div><div class="platform-name">${p.label}</div><div class="platform-sub">Klik kategori untuk belanja</div></div>`;
    html += `</div>`;
    html += `<div class="categories">`;

    if (pd.main) {
      html += `<a href="${pd.main}" target="_blank" rel="nofollow" class="cat-link main-link">
        <span class="cat-label"><span class="cat-emoji">🏠</span> Semua Produk</span>
        ${renderCatArrow()}
      </a>`;
    }

    if (cats.length > 0) {
      cats.forEach(c => {
        if (c.name && c.url) {
          html += `<a href="${c.url}" target="_blank" rel="nofollow" class="cat-link">
            <span class="cat-label"><span class="cat-emoji">${c.emoji || '🔗'}</span> ${c.name}</span>
            ${renderCatArrow()}
          </a>`;
        }
      });
    } else if (!pd.main) {
      html += `<div class="empty-cat">Belum ada link ditambahkan</div>`;
    }

    html += `</div></div></div>`;
  });

  el.innerHTML = html;
}

render();
window.addEventListener('storage', render);
</script>
</body>
</html>
